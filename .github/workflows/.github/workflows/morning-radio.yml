name: Morning Radio

on:
  # 毎日、日本時間6:45に実行
  # GitHub ActionsのcronはUTC基準です。
  schedule:
    - cron: "45 21 * * *"

  # Actions画面から手動テストできるようにします。
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: morning-radio
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonを設定
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 必要なライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 朝のラジオ原稿を生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CALENDAR_ICAL_URL: ${{ secrets.GOOGLE_CALENDAR_ICAL_URL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          python main.py

      - name: 生成結果をGitHubに保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/morning_radio.txt

          if git diff --cached --quiet; then
            echo "変更がないため、コミットしません。"
          else
            git commit -m "Update morning radio $(date -u +'%Y-%m-%d')"
            git push
          fi
